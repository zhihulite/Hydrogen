name: Android Build & Send to Telegram

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew app:assembleRelease

      - name: Upload Release APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/mapping.txt

      - name: Send APK to Telegram
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 200)
          CAPTION="📦 *新构建完成*%0A%0A🔖 分支: \`${{ github.ref_name }}\`%0A💬 提交: ${COMMIT_MSG}%0A🔢 SHA: \`${{ github.sha }}\`"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TG_CHAT_ID }}" \
            -F document=@"${APK_PATH}" \
            -F caption="${CAPTION}" \
            -F parse_mode="Markdown"
