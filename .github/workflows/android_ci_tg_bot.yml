name: Android Build & Send to Telegram

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew app:assembleRelease

      - name: Send APK to Telegram
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 200)
          CAPTION=$(printf "📦 <b>新构建完成</b>\n\n🔖 分支: <code>${{ github.ref_name }}</code>\n💬 提交: %s\n🔢 SHA: <code>${{ github.sha }}</code>" "$COMMIT_MSG")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TG_CHAT_ID }}" \
            -F document=@"${APK_PATH}" \
            -F caption="${CAPTION}" \
            -F parse_mode="HTML"
