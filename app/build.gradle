// 从 core/app_info.lua 读取版本号
def getAppVersion() {
    def coreVersion = "unknown"
    rootProject.subprojects.each { sub ->
        def appInfoFile = sub.file("src/main/assets_bin/core/app_info.lua")
        if (appInfoFile.exists()) {
            try {
                def text = appInfoFile.getText('UTF-8')
                // 匹配 M.version = 0.1
                def matcher = text =~ /M\.version\s*=\s*([\d.]+)/
                if (matcher.find()) {
                    coreVersion = matcher.group(1)
                }
            } catch (Exception e) {
                println "WARNING: 无法读取 app_info.lua: ${e.message}"
            }
        }
    }
    return coreVersion
}

// 将临时目录定义在独立的 intermediates 路径下，彻底由 Gradle 内部托管，享受 clean 自动清理
def generatedAssetsDir = layout.buildDirectory.dir("intermediates/hydrogen_custom/assets_bin")
def generatedLuaDir = layout.buildDirectory.dir("intermediates/hydrogen_custom/lua_root")

// 合并 assets_bin：收集子模块资源并平铺放入临时目录
def mergeAssetsBin = tasks.register("mergeAssetsBin", MergeTask) {
    group = "custom"
    outputDir.set(generatedAssetsDir)
    from(rootProject.subprojects.collect { it.file("src/main/assets_bin") })
    includeEmptyDirs = false
    duplicatesStrategy = DuplicatesStrategy.WARN
}

// 合并 luaLibs：包裹在 "lua" 文件夹下，后续以此结构直接送往 APK 绝对根目录
def mergeLuaLibs = tasks.register("mergeLuaLibs", MergeTask) {
    group = "custom"
    outputDir.set(generatedLuaDir)
    into("lua") {
        from(rootProject.subprojects.collect { it.file("src/main/luaLibs") })
    }
    includeEmptyDirs = false
    duplicatesStrategy = DuplicatesStrategy.WARN
}

// 采用 AGP 8+ 现代化变体源集注入，确保增量构建有效，完美规避构建时序冲突
androidComponents {
    onVariants(selector().all()) { variant ->
        // 自动建立 Task 依赖：合并后的 assets_bin 平铺打入 assets/ 根目录
        variant.sources.assets?.addGeneratedSourceDirectory(
                mergeAssetsBin,
                MergeTask::getOutputDir
        )

        // 核心跨界：将 /lua 文件夹挂载至 Java 资源管道，使其绕过 assets 限制直接直达 APK 根目录
        variant.sources.resources?.addGeneratedSourceDirectory(
                mergeLuaLibs,
                MergeTask::getOutputDir
        )

        // 现代化的 APK 文件名修改方式（完全遵循 AGP 管道，避开非安全的 renameTo 操作）
        variant.outputs.each { output ->
            def coreVer = getAppVersion()
            def appVersion = android.defaultConfig.versionName
            def newName = "Hydrogen_${appVersion}_${coreVer}.apk"
            output.outputFileName.set(newName)
        }
    }
}