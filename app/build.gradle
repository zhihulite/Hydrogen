// 使用 Sync 替代 Copy，Sync 会在每次拷贝前清空目标目录，自动同步变更并天然防残留
abstract class MergeTask extends Sync {
    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    MergeTask() {
        into(outputDir)
    }
}

// 为所有 Java 编译任务启用废弃 API 检测，编译时会在控制台输出使用了废弃 API 的具体位置
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '-Xlint:deprecation'
}

